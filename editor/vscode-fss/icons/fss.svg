<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
	<defs>
		<clipPath id="diskTop">
			<ellipse cx="12" cy="14.35" rx="8.35" ry="2.35" />
		</clipPath>
	</defs>
	<!-- Flat disk (edge-on): ocean rim -->
	<ellipse cx="12" cy="15.25" rx="9.25" ry="3.1" fill="#1E88E5" stroke="#1565C0" stroke-width="1.1" />
	<!-- Upper surface (ocean) -->
	<ellipse cx="12" cy="14.35" rx="8.35" ry="2.35" fill="#42A5F5" />
	<!-- Mercator-ish landmasses on the plane -->
	<g clip-path="url(#diskTop)">
		<!-- Americas -->
		<path
			fill="#7CB342"
			d="M 4.15 12.35 L 5.55 12.05 L 7.35 12.2 L 8.05 12.75 L 8.15 13.35 L 7.85 13.95 L 7.55 14.05 L 7.35 14.55 L 7.65 15.45 L 7.05 15.95 L 5.95 15.9 L 5.05 15.35 L 4.45 14.35 L 4.2 13.25 Z"
		/>
		<!-- Africa + Europe + Middle East + Asia (Mercator-ish strip) -->
		<path
			fill="#7CB342"
			d="M 8.05 12.75 L 8.55 12.35 L 9.55 12.12 L 10.55 12.08 L 11.35 12.35 L 11.55 12.95 L 11.45 14.05 L 11.15 15.35 L 10.35 15.85 L 9.35 15.75 L 8.75 14.95 L 8.45 13.85 L 8.05 12.75 Z M 11.35 12.32 L 12.45 12.05 L 15.05 12.02 L 17.75 12.28 L 19.45 12.78 L 20.15 13.48 L 20.05 14.18 L 18.95 14.48 L 16.85 14.32 L 14.55 13.92 L 12.55 13.42 L 11.35 12.92 Z"
		/>
		<!-- SE Asia / Indonesia + Japan-ish isles -->
		<path
			fill="#689F38"
			d="M 17.75 12.28 L 19.05 12.18 L 19.75 12.48 L 19.85 13.08 L 19.25 13.38 L 18.15 13.28 L 17.45 12.88 Z M 18.5 12.08 L 19.2 12.02 L 19.35 12.32 L 18.8 12.38 Z"
		/>
		<!-- Australia + New Guinea -->
		<path
			fill="#9CCC65"
			d="M 17.05 14.45 L 19.55 14.55 L 19.95 15.35 L 19.35 16.05 L 17.85 16.15 L 16.95 15.55 L 17.05 14.45 Z M 19.85 13.08 L 20.3 13.18 L 20.32 13.82 L 19.95 13.95 L 19.65 13.55 Z"
		/>
		<!-- Madagascar -->
		<path fill="#558B2F" d="M 11.35 14.55 L 11.65 15.45 L 11.25 15.65 L 11.05 15.05 Z" />
	</g>
	<!-- Ice / edge highlight -->
	<ellipse cx="12" cy="15.25" rx="9.25" ry="3.1" fill="none" stroke="#B3E5FC" stroke-width="0.85" opacity="0.65" />
	<!-- Firmament arc -->
	<path d="M4.25 14.25Q12 4.75 19.75 14.25" stroke="#90CAF9" stroke-width="1.15" fill="none" stroke-linecap="round" />
</svg>
